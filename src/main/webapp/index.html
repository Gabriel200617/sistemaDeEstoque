<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Sistema estoque</title>
</head>

<body>
    <header>
        <div class="box-title">
        <h1 class="Title">Sistema de Estoque</h1>
        </div>
    </header>
    <main>
        <form action="login" method="post">
            <div class="content">
                <div class="User">
                    <label>Usuário</label>
                    <input type="text" name="users" class="inputUser" placeholder="Informe o Usuário" />
                </div>
                <div class="Passsword">
                    <label>Senha</label>
                    <input type="password" name="passw" class="inputPassword" placeholder="Informe a senha" />
                </div>
                <div class="box-button">
                    <button type="submit" class="button">Entrar</button>
                </div>
            </div>
        </form>
    </main>
    <footer></footer>
</body>

</html>
